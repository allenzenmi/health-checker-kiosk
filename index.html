<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Self-Check Kiosk</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Health Self-Check Kiosk</h1>
        <p>Quick, private campus wellness assessment</p>
    </header>

    <main>
        <section class="card">
            <h2>Enter Your Details</h2>
            <form id="bmiForm" novalidate>
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" data-label="Full Name" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="age">Age</label>
                        <input type="number" id="age" min="1" max="120" data-label="Age" required>
                    </div>
                    <div class="form-group">
                        <label for="sex">Sex</label>
                        <select id="sex" data-label="Sex" required>
                            <option value="">Select</option>
                            <option value="Female">Female</option>
                            <option value="Male">Male</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="weight">Weight (kg)</label>
                        <input type="number" id="weight" min="1" step="0.1" data-label="Weight" required>
                    </div>
                    <div class="form-group">
                        <label for="height">Height (cm)</label>
                        <input type="number" id="heightCm" min="1" step="0.1" data-label="Height" required>
                    </div>
                </div>

                <button type="submit">Check My BMI</button>
            </form>
        </section>

        <section id="resultCard" class="card hidden"></section>
    </main>

    <footer>
        <p>&copy; 2026 De La Salle University - Dasmariñas. All Rights Reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
